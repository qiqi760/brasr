# ─────────────────────────────────────────────
# GLCLAP Model Configuration
# ─────────────────────────────────────────────

text_encoder:
  # ---------------------------------------------------------------------------
  # model_name supports THREE forms:
  #   1. HuggingFace Hub ID        : "bert-base-multilingual-uncased"
  #   2. ModelScope ID             : "google-bert/bert-base-multilingual-uncased"
  #   3. Absolute local path       : "/path/to/pretrained_models/bert-base-multilingual-uncased"
  #
  # For offline clusters without internet access:
  #   - Download on a networked machine: ./scripts/download_models.sh --source modelscope
  #   - Copy the downloaded folder to the cluster
  #   - Set model_name to the local path below
  #   - Optionally set env var: export TRANSFORMERS_OFFLINE=1
  # ---------------------------------------------------------------------------
  model_name: "bert-base-multilingual-uncased"
  # Output hidden size from BERT: 768
  # After average pooling over token dim → [B, 768]
  freeze_layers: 999        # 999 = freeze ALL layers (only projection heads trained)
  use_attention_pooling: true   # true → Attention Pooling (arXiv:2505.19179)

audio_encoder:
  # ---------------------------------------------------------------------------
  # Same as text_encoder: HF Hub ID / ModelScope ID / local path are all valid.
  # Default: "facebook/data2vec-audio-large-960h"
  # ModelScope mirror also works:  modelscope download --model facebook/data2vec-audio-large-960h
  # ---------------------------------------------------------------------------
  model_name: "facebook/data2vec-audio-large-960h"  #在libri上微调得的除掉linear层
  # The audio encoder outputs [B, T//4, hidden_size].
  # hidden_size for data2vec-audio-large = 1024.
  freeze_layers: 999        # 999 = freeze ALL layers (only projection heads trained)
  use_attention_pooling: true   # true → Attention Pooling (arXiv:2505.19179)

projection:
  # Project both text (768) and audio (1024) to a shared embedding space.
  embed_dim: 512            # final joint embedding dimension D
  # text_proj: Linear(768 → 512)
  # audio_proj: Linear(1024 → 512)

subtext:
  # Subtext sampling strategy (see data/subtext.py)
  min_words: 1              # minimum words in a subtext span
  max_words: 5              # maximum words in a subtext span
  # TODO: paper does not specify exact sampling algorithm;
  #       current assumption: uniform random contiguous word span.

# When encoders are fully frozen, detach their outputs to cut the computation
# graph. This prevents PyTorch from storing encoder activations for backward,
# saving ~60-75% GPU memory at the cost of never being able to fine-tune the
# encoders in the same run.
detach_encoders: true
